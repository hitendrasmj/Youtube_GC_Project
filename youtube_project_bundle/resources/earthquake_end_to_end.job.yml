resources:
  jobs:
    youtube_earthquake_end_to_end_job:
      name: youtube_earthquake_end_to_end_job_prod
      tasks:
        - task_key: Ingestion_Bronze
          notebook_task:
            notebook_path: ../src/notebooks/Ingestion_Bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Bronze_To_Silver_EarthQuake
          depends_on:
            - task_key: Ingestion_Bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_silver_earthquake_etl.id}
        - task_key: EarthQuack_Dashboard
          depends_on:
            - task_key: Bronze_To_Silver_EarthQuake
          dashboard_task:
            subscription: {}
            warehouse_id: fa4c3cdbe539d618
            dashboard_id: ${resources.dashboards.earthquake_monitor.id}
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED